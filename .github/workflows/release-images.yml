name: Release Images

# 打 tag（v*）时构建并推送预构建镜像到 GHCR
# 这样低配服务器无需现场编译，直接 docker compose pull 即可运行

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}  # ShengTong1/yunpay

jobs:
  build-images:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # 推送到 GHCR 所需权限

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU（多架构支持）
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取镜像版本号（v1.0.0 -> 1.0.0）
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: 构建并推送 payment（支付网关）
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./jeepay-payment/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-payment:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-payment:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建并推送 manager（运营平台）
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./jeepay-manager/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-manager:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-manager:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建并推送 ui-manager（运营平台前端）
        uses: docker/build-push-action@v5
        with:
          context: ./jeepay-ui
          file: ./jeepay-ui/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: PLATFORM=manager
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ui-manager:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ui-manager:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
